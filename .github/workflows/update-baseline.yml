name: update-vrt-baseline

on:
  pull_request:
    types: [labeled]

defaults:
  run:
    shell: bash

jobs:
  update:
    if: github.event.label.name == 'vrt-approved'
    runs-on: macos-26
    permissions:
      contents: write
    steps:
    - name: Check maintainer write permission
      uses: actions/github-script@v7
      with:
        script: |
          const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
            owner: context.repo.owner,
            repo: context.repo.repo,
            username: context.actor,
          });
          const allowed = ['admin', 'write'];
          if (!allowed.includes(data.permission)) {
            core.setFailed(
              `@${context.actor} does not have write permission. ` +
              `Only maintainers can approve VRT baseline updates.`
            );
          }

    - name: Select Xcode version
      run: sudo xcode-select -s '/Applications/Xcode_26.4.app/Contents/Developer'

    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0

    - name: Generate snapshots from PR branch
      run: |
        set -o pipefail
        export RECORD_SNAPSHOTS=true
        xcodebuild -scheme Teloscope test \
          -only-testing TeloscopeTests/PreviewSnapshotTests \
          | xcbeautify

    - name: Push updated baselines to vrt-baselines
      run: |
        SNAPSHOT_SRC="TeloscopeTests/VRT/__Snapshots__/PreviewSnapshotTests"
        PR_NUM="${{ github.event.pull_request.number }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git fetch origin vrt-baselines
        git worktree add /tmp/vrt-baselines origin/vrt-baselines

        mkdir -p "/tmp/vrt-baselines/TeloscopeTests/VRT/__Snapshots__"
        rsync -av --delete "$SNAPSHOT_SRC/" \
          "/tmp/vrt-baselines/TeloscopeTests/VRT/__Snapshots__/PreviewSnapshotTests/"

        cd /tmp/vrt-baselines
        git add -A
        git diff --staged --quiet || \
          git commit -m "chore: update VRT baselines from PR #${PR_NUM} [skip ci]"
        git push origin HEAD:vrt-baselines

        cd -
        git worktree remove /tmp/vrt-baselines --force

name: update-vrt-baseline

on:
  pull_request:
    types: [labeled]

defaults:
  run:
    shell: bash

jobs:
  update:
    if: github.event.label.name == 'vrt-approved'
    runs-on: macos-26
    permissions:
      contents: write
      issues: write
    steps:
    - name: Check maintainer write permission
      uses: actions/github-script@v7
      with:
        script: |
          const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
            owner: context.repo.owner,
            repo: context.repo.repo,
            username: context.actor,
          });
          const allowed = ['admin', 'write'];
          if (!allowed.includes(data.permission)) {
            core.setFailed(
              `@${context.actor} does not have write permission. ` +
              `Only maintainers can approve VRT baseline updates.`
            );
          }

    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0

    - uses: ./.github/actions/generate-vrt-snapshots

    - uses: ./.github/actions/push-vrt-baselines
      with:
        commit-message: "chore: update VRT baselines from PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.sha }}) [skip ci]"

    - name: Remove vrt-approved label
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.removeLabel({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            name: 'vrt-approved',
          }).catch(() => {});

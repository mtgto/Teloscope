name: Push VRT Baselines
description: Push generated snapshots to the vrt-baselines orphan branch

inputs:
  commit-message:
    description: Commit message for the baseline update
    required: true

runs:
  using: composite
  steps:
  - name: Push to vrt-baselines
    shell: bash
    run: |
      SNAPSHOT_SRC="$HOME/Library/Containers/net.mtgto.Teloscope/Data/tmp/VRTSnapshots"

      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"

      git fetch origin vrt-baselines
      git worktree add /tmp/vrt-baselines origin/vrt-baselines

      mkdir -p "/tmp/vrt-baselines/TeloscopeTests/VRT/__Snapshots__/PreviewSnapshotTests"
      rsync -av --delete "$SNAPSHOT_SRC/" \
        "/tmp/vrt-baselines/TeloscopeTests/VRT/__Snapshots__/PreviewSnapshotTests/"

      cd /tmp/vrt-baselines
      git add -A
      git diff --staged --quiet || \
        git commit -m "${{ inputs.commit-message }}"
      git push origin HEAD:vrt-baselines

      cd -
      git worktree remove /tmp/vrt-baselines --force
